apiVersion: v1
kind: Namespace
metadata:
  name: hospital-ms
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hospital-config
  namespace: hospital-ms
data:
  JWT_SECRET: shared_microservice_secret
  INTERNAL_API_SECRET: internal_bootstrap_ds_ass1
  RABBITMQ_URL: amqp://rabbitmq:5672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: hospital-ms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672
            - containerPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: hospital-ms
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: mgmt
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: hospital-ms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: MONGO_URI
              value: "mongodb://mongo:27017/auth_db"
            - name: JWT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: hospital-config
                  key: JWT_SECRET
            - name: DOCTOR_SERVICE_URL
              value: "http://doctor-service:4003"
            - name: INTERNAL_API_SECRET
              valueFrom:
                configMapKeyRef:
                  name: hospital-config
                  key: INTERNAL_API_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: hospital-ms
spec:
  selector:
    app: auth-service
  ports:
    - port: 4001
      targetPort: 4001
---
