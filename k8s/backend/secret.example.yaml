apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: hospital-system
type: Opaque
stringData:
  MONGO_URI: "mongodb+srv://<username>:<password>@cluster0.xxxxx.mongodb.net/hospital?retryWrites=true&w=majority&appName=Cluster0"
  JWT_SECRET: "replace_with_long_random_secret"
  DNS_SERVERS: "8.8.8.8,1.1.1.1"
